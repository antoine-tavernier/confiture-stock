<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="apple-touch-icon" href="icon-apple.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Confiture" />
  <meta name="theme-color" content="#f0c0d0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <title>Stock Confiture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:      #8B5A8C;
      --purple-dark: #5e3460;
      --purple-soft: #f0daf0;
      --pink-bg:     #f7dde8;
      --pink-mid:    #edcad8;
      --red:         #d94f4f;
      --green:       #279218;
      --text:        #1a0e2e;
      --muted:       #9b87a8;
      --border:      #e8d5e0;
      --card:        #ffffff;
      --bg:          #f7dde8;
      --radius:      16px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      text-transform: uppercase;
    }

    /* ── Header ── */
    header {
      background: var(--pink-bg);
      color: var(--text);
      padding: calc(20px + var(--safe-top)) 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      flex: 1;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }
    header .total {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--purple);
      font-size: 1.6rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      display: none;
    }

    /* ── List ── */
    main { padding: 16px; padding-bottom: calc(90px + var(--safe-bottom)); }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.95rem; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 10px;
      border: none;
      box-shadow: 0 2px 12px rgba(90,40,100,0.08);
      overflow: hidden;
    }
    .card-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .card-row:active { background: var(--purple-soft); }

    .badge {
      background: var(--purple-soft);
      color: var(--purple-dark);
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .card-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    .menu-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    /* ── Stock row ── */
    .stock-row {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      gap: 8px;
      border-top: 1px solid #f3eaf0;
    }
    .stock-row:first-child { border-top: none; }
    .stock-info { flex: 1; min-width: 0; }
    .stock-name { font-weight: 700; font-size: 0.97rem; color: var(--text); }
    .stock-year { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .qty-ctrl { display: flex; align-items: center; gap: 2px; }
    .qty-btn {
      width: 32px; height: 32px;
      border: none;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
      font-weight: 700;
      transition: transform 0.1s;
    }
    .qty-btn:active { transform: scale(0.9); }
    .qty-btn.minus { background: #fde8e8; color: var(--red); }
    .qty-btn.plus  { background: #e2f5e0; color: var(--green); }
    .qty-val { font-weight: 700; font-size: 1.1rem; min-width: 32px; text-align: center; color: var(--text); }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      right: 20px;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 50%;
      width: 58px;
      height: 58px;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(139,90,140,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
      z-index: 20;
    }
    .fab:active { transform: scale(0.93); }
    .fab.visible { display: flex; }

    /* ── Add stock button ── */
    .add-stock-btn {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 20px;
      right: 20px;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(139,90,140,0.35);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
      z-index: 20;
      display: none;
    }
    .add-stock-btn:active { transform: scale(0.98); }
    .add-stock-btn.visible { display: block; }

    /* ── Add location button ── */
    .add-loc-btn {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 20px;
      right: 20px;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(139,90,140,0.35);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
      z-index: 20;
      display: none;
    }
    .add-loc-btn:active { transform: scale(0.98); }
    .add-loc-btn.visible { display: block; }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(26,14,46,0.35);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--safe-bottom);
    }
    .overlay.hidden { display: none; }

    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 28px 20px 24px;
      width: 100%;
      max-width: 480px;
    }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: var(--text); }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .field input, .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus { border-color: var(--purple); }

    .field-row { display: flex; gap: 10px; }
    .field-row .field { flex: 1; }

    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-cancel { background: var(--pink-mid); color: var(--muted); }
    .btn-ok { background: var(--purple); color: white; }

    /* ── Context menu ── */
    .ctx-overlay {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--safe-bottom);
    }
    .ctx-overlay.hidden { display: none; }
    .ctx-bg { position: absolute; inset: 0; background: rgba(26,14,46,0.3); }
    .ctx-menu {
      position: relative;
      background: white;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .ctx-item {
      padding: 17px 20px;
      font-size: 1rem;
      cursor: pointer;
      border-top: 1px solid #f3eaf0;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
      background: none;
      border-left: none;
      border-right: none;
      border-bottom: none;
      width: 100%;
      text-align: left;
      color: var(--text);
      font-weight: 500;
    }
    .ctx-item:first-child { border-top: none; }
    .ctx-item:active { background: var(--purple-soft); }
    .ctx-item.danger { color: var(--red); }
    .ctx-title {
      padding: 16px 20px 10px;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Search ── */
    .search-bar {
      padding: 0 16px 14px;
      background: var(--bg);
      display: none;
    }
    .search-bar.visible { display: block; }
    .search-bar input {
      width: 100%;
      padding: 11px 16px 11px 38px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-family: inherit;
      text-transform: uppercase;
      color: var(--text);
      background: white;
      outline: none;
      box-shadow: 0 2px 8px rgba(90,40,100,0.08);
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }
  </style>
</head>
<body>

<header>
  <button class="back-btn" id="backBtn" onclick="showLocations()">‹</button>
  <h1 id="headerTitle">Stock Confiture</h1>
  <span class="total" id="headerTotal"></span>
</header>

<div class="search-bar" id="searchBar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="Rechercher une confiture…" oninput="render()" />
  </div>
</div>

<main id="main"></main>

<button class="fab hidden" id="fab"></button>
<button class="add-loc-btn" id="addLocBtn" onclick="pickJarToOpen()">🫙 Ouvrir un pot</button>
<button class="add-stock-btn" id="addStockBtn" onclick="promptAddEntry(currentLocId)">＋ Agrandir le stock</button>

<!-- Modal ajout/édition -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Nouveau lieu</h2>
    <div id="modalFields"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn btn-ok" onclick="submitModal()">OK</button>
    </div>
  </div>
</div>

<!-- Menu contextuel -->
<div class="ctx-overlay hidden" id="ctxOverlay">
  <div class="ctx-bg" onclick="closeCtx()"></div>
  <div class="ctx-menu" id="ctxMenu"></div>
</div>

<script>
// ── Store ─────────────────────────────────────────────────────────────────────
const STORE_KEY = 'confiture_v1';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}
function saveData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
}

let data = loadData();

// ── State ─────────────────────────────────────────────────────────────────────
let currentLocId = null;
let modalCallback = null;
let sortBy = 'name'; // 'name' | 'year' | 'loc' | 'qty'
const SORT_LABELS = { name: 'Nom', year: 'Année', loc: 'Lieu', qty: 'Quantité' };
const SORT_OPTIONS = ['name', 'year', 'loc', 'qty'];

function setSortBy(val) { sortBy = val; render(); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function getLoc(id) { return data.find(l => l.id === id); }

function totalLoc(loc) { return loc.entries.reduce((s, e) => s + e.qty, 0); }

function totalAll() { return data.reduce((s, l) => s + totalLoc(l), 0); }

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (currentLocId === null) renderLocations();
  else renderStock(currentLocId);
}

function renderLocations() {
  const total = totalAll();
  document.getElementById('headerTitle').textContent = '🫙 Stock Confiture';
  document.getElementById('headerTotal').textContent =
    total ? `${total} pot${total > 1 ? 's' : ''}` : '';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('fab').classList.remove('visible');
  document.getElementById('addLocBtn').classList.add('visible');
  document.getElementById('addStockBtn').classList.remove('visible');
  document.getElementById('searchBar').classList.add('visible');
  const query = (document.getElementById('searchInput').value || '').trim().toLowerCase();

  const main = document.getElementById('main');
  if (data.length === 0) {
    main.innerHTML = `<div class="empty">
      <div class="icon">🫙</div>
      <p>Aucun lieu de stockage</p>
      <p style="margin-top:6px;font-size:0.85rem">Appuie sur + pour en ajouter un</p>
    </div>`;
    return;
  }

  const locsHtml = query ? '' : data.map(loc => {
    const t = totalLoc(loc);
    const n = loc.entries.length;
    return `<div class="card">
      <div class="card-row" onclick="openLoc('${loc.id}')">
        <div class="badge">${t}</div>
        <div class="card-info">
          <div class="card-name">${esc(loc.name)}</div>
        </div>
        <button class="menu-btn" onclick="event.stopPropagation(); locMenu('${loc.id}')">⋯</button>
      </div>
    </div>`;
  }).join('');

  const allEntries = data.flatMap(loc =>
    loc.entries.map(e => ({ id: e.id, name: e.name, qty: e.qty, year: e.year, locName: loc.name }))
  ).filter(e => !query || e.name.toLowerCase().includes(query))
   .sort((a, b) => {
     if (sortBy === 'qty')  return b.qty - a.qty;
     if (sortBy === 'year') return (b.year || '').localeCompare(a.year || '');
     if (sortBy === 'loc')  return a.locName.localeCompare(b.locName);
     return a.name.localeCompare(b.name);
   });

  const sortPills = SORT_OPTIONS.map(opt =>
    `<button onclick="setSortBy('${opt}')" style="
      padding:5px 12px;border:none;border-radius:20px;font-family:inherit;
      font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      background:${sortBy === opt ? 'var(--purple)' : 'white'};
      color:${sortBy === opt ? 'white' : 'var(--muted)'};
      box-shadow:${sortBy === opt ? '0 2px 8px rgba(139,90,140,0.3)' : 'none'};
    ">${SORT_LABELS[opt]}</button>`
  ).join('');

  const divider = `<div style="margin:18px 0 10px;">
    <button onclick="promptAddLocation()" style="
      width:100%;background:white;color:var(--purple);
      border:1.5px dashed var(--purple-soft);border-radius:14px;
      padding:10px;margin-bottom:12px;
      font-family:inherit;font-size:0.82rem;font-weight:700;
      text-transform:uppercase;letter-spacing:0.04em;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
    ">＋ Ajouter un lieu</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;">Tout le stock</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
      <span style="font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-right:2px;">Trier :</span>
      ${sortPills}
    </div>
  </div>`;

  const allHtml = allEntries.length === 0 ? (query ? `<div class="empty"><div class="icon">🔍</div><p>Aucun résultat</p></div>` : '') :
    `<div class="card">${allEntries.map(e => `
      <div class="stock-row">
        <div class="stock-info">
          <div class="stock-name">${esc(e.name)}</div>
          <div class="stock-year">${esc(e.locName)}${e.year ? ' · ' + esc(e.year) : ''}</div>
        </div>
        <span class="qty-val">${e.qty}</span>
      </div>`).join('')}</div>`;

  main.innerHTML = locsHtml + divider + allHtml;
}

function renderStock(locId) {
  const loc = getLoc(locId);
  if (!loc) { showLocations(); return; }

  const total = totalLoc(loc);
  document.getElementById('headerTitle').textContent = esc(loc.name);
  document.getElementById('headerTotal').textContent =
    total ? `${total} pot${total > 1 ? 's' : ''}` : '';
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('fab').classList.remove('visible');
  document.getElementById('addLocBtn').classList.remove('visible');
  document.getElementById('addStockBtn').classList.add('visible');
  document.getElementById('searchBar').classList.remove('visible');
  document.getElementById('searchInput').value = '';

  const main = document.getElementById('main');
  if (loc.entries.length === 0) {
    main.innerHTML = `<div class="empty">
      <div class="icon">📦</div>
      <p>Aucun stock ici</p>
      <p style="margin-top:6px;font-size:0.85rem">Appuie sur + pour ajouter une confiture</p>
    </div>`;
    return;
  }

  main.innerHTML = `<div class="card">${loc.entries.map(e => `
    <div class="stock-row" style="flex-direction:column;align-items:stretch;gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="stock-info">
          <div class="stock-name">${esc(e.name)}</div>
          ${e.year ? `<div class="stock-year">${esc(e.year)}</div>` : ''}
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn minus" onclick="adjustQty('${loc.id}','${e.id}',-1)">−</button>
          <span class="qty-val">${e.qty}</span>
          <button class="qty-btn plus"  onclick="adjustQty('${loc.id}','${e.id}',+1)">+</button>
        </div>
        <button class="menu-btn" onclick="entryMenu('${loc.id}','${e.id}')">⋯</button>
      </div>
      ${data.filter(l => l.id !== loc.id).length > 0 ? `
      <button onclick="promptTransfer('${loc.id}','${e.id}')" style="
        background:var(--purple-soft);color:var(--purple-dark);
        border:none;border-radius:10px;padding:7px 14px;
        font-family:inherit;font-size:0.78rem;font-weight:700;
        text-transform:uppercase;letter-spacing:0.04em;
        cursor:pointer;-webkit-tap-highlight-color:transparent;
        width:100%;text-align:center;
      ">⇄ Transférer</button>` : ''}
    </div>`).join('')}</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Navigation ────────────────────────────────────────────────────────────────
function openLoc(id) { currentLocId = id; render(); }
function showLocations() { currentLocId = null; render(); }

// ── FAB ───────────────────────────────────────────────────────────────────────
function onFab() {
  if (currentLocId === null) promptAddLocation();
  else promptAddEntry(currentLocId);
}

// ── Quantity ──────────────────────────────────────────────────────────────────
function pickJarToOpen() {
  const entries = data.flatMap(loc =>
    loc.entries.map(e => ({ locId: loc.id, entryId: e.id, name: e.name, locName: loc.name, year: e.year }))
  ).sort((a, b) => a.name.localeCompare(b.name));

  openCtx('Quelle confiture ?', entries.map(e => ({
    label: `${e.name}${e.year ? ' ' + e.year : ''} — ${e.locName}`,
    action: () => confirmOpenJar(e.locId, e.entryId, e.name),
  })));
}

function confirmOpenJar(locId, entryId, name) {
  openCtx(`Ouvrir un pot de ${name} ?`, [
    { label: '🫙 Confirmer — retirer 1 pot', action: () => {
      adjustQty(locId, entryId, -1);
    }},
  ]);
}

function adjustQty(locId, entryId, delta) {
  const loc = getLoc(locId);
  const entry = loc.entries.find(e => e.id === entryId);
  if (!entry) return;
  entry.qty = Math.max(0, entry.qty + delta);
  if (entry.qty === 0) {
    const loc = getLoc(locId);
    loc.entries = loc.entries.filter(e => e.id !== entryId);
  }
  saveData(data);
  render();
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openModal(title, fields, callback) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalFields').innerHTML = fields;
  modalCallback = callback;
  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(() => {
    const first = document.querySelector('#modalFields input');
    if (first) first.focus();
  }, 100);
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  modalCallback = null;
}

function submitModal() {
  if (modalCallback) modalCallback();
}

// Appui Entrée pour valider
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('overlay').classList.contains('hidden')) {
    submitModal();
  }
});

// ── Lieu ──────────────────────────────────────────────────────────────────────
function promptAddLocation() {
  openModal('Nouveau lieu',
    `<div class="field"><label>Nom du lieu</label>
     <input id="f_name" type="text" placeholder="Cave, Cuisine, Garage…" /></div>`,
    () => {
      const name = document.getElementById('f_name').value.trim();
      if (!name) return;
      data.push({ id: uid(), name, entries: [] });
      saveData(data);
      closeModal();
      render();
    }
  );
}

function promptRenameLocation(locId) {
  const loc = getLoc(locId);
  openModal('Renommer',
    `<div class="field"><label>Nom du lieu</label>
     <input id="f_name" type="text" value="${esc(loc.name)}" /></div>`,
    () => {
      const name = document.getElementById('f_name').value.trim();
      if (!name) return;
      loc.name = name;
      saveData(data);
      closeModal();
      render();
    }
  );
}

function deleteLocation(locId) {
  const loc = getLoc(locId);
  if (!confirm(`Supprimer "${loc.name}" et tout son stock ?`)) return;
  data = data.filter(l => l.id !== locId);
  saveData(data);
  if (currentLocId === locId) currentLocId = null;
  render();
}

function locMenu(locId) {
  const loc = getLoc(locId);
  openCtx(esc(loc.name), [
    { label: 'Renommer', action: () => promptRenameLocation(locId) },
    { label: 'Supprimer', danger: true, action: () => deleteLocation(locId) },
  ]);
}

// ── Entrée confiture ──────────────────────────────────────────────────────────
function promptAddEntry(locId) {
  const year = new Date().getFullYear();
  openModal('Ajouter une confiture',
    `<div class="field"><label>Nom</label>
     <input id="f_name" type="text" placeholder="Fraises, Abricots, Mirabelles…" /></div>
     <div class="field-row">
       <div class="field"><label>Quantité</label>
         <input id="f_qty" type="number" min="0" value="1" /></div>
       <div class="field"><label>Année</label>
         <input id="f_year" type="number" value="${year}" /></div>
     </div>`,
    () => {
      const name = document.getElementById('f_name').value.trim();
      const qty  = parseInt(document.getElementById('f_qty').value) || 0;
      const yr   = document.getElementById('f_year').value.trim();
      if (!name) return;
      const loc = getLoc(locId);
      const existing = loc.entries.find(e =>
        e.name.toLowerCase() === name.toLowerCase() && e.year === yr
      );
      if (existing) {
        existing.qty += qty;
      } else {
        loc.entries.push({ id: uid(), name, qty, year: yr });
      }
      saveData(data);
      closeModal();
      render();
    }
  );
}

function promptEditEntry(locId, entryId) {
  const loc = getLoc(locId);
  const e = loc.entries.find(x => x.id === entryId);
  openModal('Modifier',
    `<div class="field"><label>Nom</label>
     <input id="f_name" type="text" value="${esc(e.name)}" /></div>
     <div class="field-row">
       <div class="field"><label>Quantité</label>
         <input id="f_qty" type="number" min="0" value="${e.qty}" /></div>
       <div class="field"><label>Année</label>
         <input id="f_year" type="number" value="${esc(e.year)}" /></div>
     </div>`,
    () => {
      const name = document.getElementById('f_name').value.trim();
      const qty  = parseInt(document.getElementById('f_qty').value) || 0;
      const yr   = document.getElementById('f_year').value.trim();
      if (!name) return;
      e.name = name; e.qty = qty; e.year = yr;
      saveData(data);
      closeModal();
      render();
    }
  );
}

function deleteEntry(locId, entryId) {
  const loc = getLoc(locId);
  const e = loc.entries.find(x => x.id === entryId);
  if (!confirm(`Supprimer "${e.name}" ?`)) return;
  loc.entries = loc.entries.filter(x => x.id !== entryId);
  saveData(data);
  render();
}

function entryMenu(locId, entryId) {
  const e = getLoc(locId).entries.find(x => x.id === entryId);
  const items = [
    { label: 'Modifier', action: () => promptEditEntry(locId, entryId) },
    { label: 'Supprimer', danger: true, action: () => deleteEntry(locId, entryId) },
  ];
  openCtx(esc(e.name), items);
}

function promptTransfer(locId, entryId) {
  const entry = getLoc(locId).entries.find(x => x.id === entryId);
  const destinations = data.filter(l => l.id !== locId);
  const options = destinations.map(l =>
    `<option value="${l.id}">${esc(l.name)}</option>`
  ).join('');

  openModal('Transférer',
    `<div class="field"><label>Vers quel lieu ?</label>
      <select id="f_dest" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:1rem;font-family:inherit;background:var(--bg);outline:none;">
        ${options}
      </select>
    </div>
    <div class="field"><label>Quantité à transférer (max ${entry.qty})</label>
      <input id="f_qty" type="number" min="1" max="${entry.qty}" value="${entry.qty}" />
    </div>`,
    () => {
      const destId = document.getElementById('f_dest').value;
      const qty = Math.min(parseInt(document.getElementById('f_qty').value) || 0, entry.qty);
      if (qty <= 0) return;

      const dest = getLoc(destId);
      const existing = dest.entries.find(x => x.name === entry.name && x.year === entry.year);
      if (existing) {
        existing.qty += qty;
      } else {
        dest.entries.push({ id: uid(), name: entry.name, qty, year: entry.year });
      }

      entry.qty -= qty;
      if (entry.qty === 0) {
        getLoc(locId).entries = getLoc(locId).entries.filter(x => x.id !== entryId);
      }

      saveData(data);
      closeModal();
      render();
    }
  );
}

// ── Context menu ──────────────────────────────────────────────────────────────
function openCtx(title, items) {
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = `<div class="ctx-title">${title}</div>` +
    items.map((item, i) =>
      `<button class="ctx-item${item.danger ? ' danger' : ''}" onclick="ctxAction(${i})">${item.label}</button>`
    ).join('');
  document.getElementById('ctxOverlay').classList.remove('hidden');
  document.getElementById('ctxOverlay')._actions = items.map(i => i.action);
}

function ctxAction(i) {
  const actions = document.getElementById('ctxOverlay')._actions;
  closeCtx();
  if (actions && actions[i]) actions[i]();
}

function closeCtx() {
  document.getElementById('ctxOverlay').classList.add('hidden');
}

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
